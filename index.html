<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Locusable Studio</title>
  <meta name="description" content="Locusable Studio — software with a sense of place. Indie apps for the Apple ecosystem.">
  <link rel="icon" href="/favicon.ico?v=7" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=7">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=7">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=7">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #071018;
      --bg-2: #0b1829;
      --fg: #f2efe8;
      --muted: #9aa6b2;
      --gold: #c9a24d;
      --line: rgba(242, 239, 232, 0.12);
      --card: rgba(14, 28, 44, 0.72);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100%; }

    body {
      font-family: "Instrument Sans", system-ui, sans-serif;
      color: var(--fg);
      background:
        radial-gradient(ellipse 80% 50% at 70% -10%, rgba(201, 162, 77, 0.18), transparent 55%),
        radial-gradient(ellipse 60% 40% at 10% 90%, rgba(64, 120, 160, 0.16), transparent 50%),
        linear-gradient(165deg, var(--bg) 0%, var(--bg-2) 55%, #091420 100%);
      background-attachment: fixed;
      line-height: 1.5;
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 920px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 1.5rem;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2.75rem;
      padding: 2rem 0 3rem;
      animation: rise 0.8s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: none; }
    }

    .brand {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(2.75rem, 8vw, 4.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }

    .brand em {
      font-style: italic;
      color: var(--gold);
    }

    .tagline {
      margin-top: 0.85rem;
      max-width: 28rem;
      color: var(--muted);
      font-size: 1.05rem;
      animation: rise 0.9s ease 0.08s both;
    }

    .apps {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: rise 0.9s ease 0.16s both;
    }

    .app-card {
      display: block;
      text-decoration: none;
      color: inherit;
      padding: 1.25rem 1.4rem 1.35rem;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      backdrop-filter: blur(16px);
      transition: border-color 0.25s ease, transform 0.25s ease, background 0.25s ease;
    }

    .app-card:hover,
    .app-card:focus-visible {
      border-color: rgba(201, 162, 77, 0.45);
      background: rgba(18, 36, 56, 0.88);
      transform: translateY(-3px);
      outline: none;
    }

    .app-card-top {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 1.15rem;
      align-items: center;
    }

    .app-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .app-card h2 {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .app-card p {
      margin-top: 0.35rem;
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 28rem;
    }

    .app-card .cta {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gold);
      white-space: nowrap;
    }

    .shots {
      display: flex;
      gap: 10px;
      margin-top: 1.15rem;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .shot {
      width: 148px;
      flex: 0 0 auto;
      aspect-ratio: 1170 / 844;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0a1018;
    }

    .shot img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    footer {
      padding-top: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.85rem;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
    }

    footer a:hover,
    footer a:focus-visible {
      color: var(--fg);
      outline: none;
    }
  </style>
</head>
<body>
  <div class="shell">
    <main class="hero">
      <div>
        <h1 class="brand">Locusable <em>Studio</em></h1>
        <p class="tagline">Software with a sense of place. Apps for the Apple ecosystem.</p>
      </div>

      <section class="apps" aria-label="Apps">
        <a class="app-card" href="/here-wallpaper/">
          <div class="app-card-top">
            <img class="app-icon" src="/assets/here/icon-192.png" width="72" height="72" alt="Here Wallpaper">
            <div>
              <h2>Here Wallpaper</h2>
              <p>Map lock-screen wallpapers — pick a place, theme, and layout.</p>
            </div>
            <span class="cta">Open →</span>
          </div>
          <div class="shots" aria-hidden="true">
            <div class="shot"><img src="/assets/shots/shot-1.jpg?v=7" alt="" width="148" height="107"></div>
            <div class="shot"><img src="/assets/shots/shot-2.jpg?v=7" alt="" width="148" height="107"></div>
            <div class="shot"><img src="/assets/shots/shot-3.jpg?v=7" alt="" width="148" height="107"></div>
          </div>
        </a>

        <a class="app-card" href="https://sidefy.locusable.com/" target="_blank" rel="noopener noreferrer">
          <div class="app-card-top">
            <img class="app-icon" src="/assets/sidefy/icon-192.png" width="72" height="72" alt="Sidefy">
            <div>
              <h2>Sidefy</h2>
              <p>Screen-edge timeline for calendar, RSS, and plugins on Mac.</p>
            </div>
            <span class="cta">Open →</span>
          </div>
          <div class="shots" aria-hidden="true">
            <div class="shot"><img src="/assets/sidefy/shot-1.jpg?v=3" alt="" width="148" height="107"></div>
            <div class="shot"><img src="/assets/sidefy/shot-2.jpg?v=3" alt="" width="148" height="107"></div>
            <div class="shot"><img src="/assets/sidefy/shot-3.jpg?v=3" alt="" width="148" height="107"></div>
          </div>
        </a>
      </section>
    </main>

    <footer>
      <span>© 2026 Locusable Studio</span>
    </footer>
  </div>
</body>
</html>
