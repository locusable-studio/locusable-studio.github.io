<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Here Wallpaper — Themes</title>
  <meta name="description" content="Here Wallpaper theme preview — Basic, Pro, and Legacy palettes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #071018;
      --page-text: #f2efe8;
      --page-muted: #9aa6b2;
      --card-bg: #101820;
      --border: #243040;
      --gold: #c9a24d;
      --line: rgba(242, 239, 232, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Instrument Sans", system-ui, sans-serif;
      background:
        radial-gradient(ellipse 70% 40% at 80% 0%, rgba(201, 162, 77, 0.12), transparent 50%),
        var(--page-bg);
      color: var(--page-text);
      line-height: 1.5;
      padding: 28px 24px 48px;
    }

    .topbar {
      max-width: 1200px;
      margin: 0 auto 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      align-items: baseline;
      justify-content: space-between;
    }

    .topbar a {
      color: var(--page-muted);
      text-decoration: none;
      font-size: 14px;
    }

    .topbar a:hover { color: var(--page-text); }

    header {
      max-width: 1200px;
      margin: 0 auto 40px;
      animation: rise 0.7s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: none; }
    }

    .page-title-zh {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 400;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .page-title-en {
      margin-top: 6px;
      font-size: 18px;
      font-weight: 500;
      color: var(--page-muted);
    }

    .page-lead {
      margin-top: 14px;
      max-width: 36rem;
      color: var(--page-muted);
      font-size: 15px;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--page-muted);
      margin-bottom: 20px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: baseline;
    }

    .section-title-zh {
      font-size: 15px;
      color: var(--page-text);
      text-transform: none;
      letter-spacing: 0;
    }

    .section-title-en {
      font-size: 13px;
      color: var(--page-muted);
      text-transform: none;
      letter-spacing: 0;
    }

    .section-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--page-muted);
      text-transform: none;
      letter-spacing: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .theme-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: rise 0.6s ease both;
    }

    .theme-meta { padding: 16px 16px 12px; }

    .theme-meta h3 {
      font-size: 17px;
      font-weight: 600;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .theme-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    .theme-title-zh { line-height: 1.25; }

    .theme-title-en {
      font-size: 13px;
      font-weight: 500;
      color: var(--page-muted);
      line-height: 1.25;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 999px;
      background: #2a3140;
      color: #aeb6c2;
    }

    .badge.pro { background: #2b2240; color: #c4a8e8; }
    .badge.legacy { background: #2a2818; color: #c4b88a; }
    .badge.source { background: #1e2a38; color: #8eb4d0; }

    .theme-meta p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--page-muted);
      line-height: 1.45;
    }

    .theme-desc-en {
      margin-top: 4px;
      font-size: 12px;
      color: #7d848c;
    }

    section {
      max-width: 1200px;
      margin: 0 auto 48px;
    }

    .phone-wrap { padding: 0 16px 16px; }

    .phone {
      width: 100%;
      aspect-ratio: 393 / 852;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .wallpaper { position: absolute; inset: 0; overflow: hidden; }
    .layer-land { position: absolute; inset: 0; }

    .layer-water {
      position: absolute;
      right: 8%;
      top: 22%;
      width: 34%;
      height: 22%;
      border-radius: 18% 42% 38% 28%;
      opacity: 0.95;
    }

    .layer-park {
      position: absolute;
      left: 6%;
      top: 38%;
      width: 28%;
      height: 14%;
      border-radius: 12px;
      opacity: 0.9;
    }

    .layer-building {
      position: absolute;
      left: 42%;
      top: 30%;
      width: 18%;
      height: 20%;
      border-radius: 4px;
      opacity: 0.85;
    }

    .roads {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .fade-bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 25%;
      pointer-events: none;
    }

    .poster-text {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 7%;
      text-align: center;
      z-index: 2;
      pointer-events: none;
    }

    .poster-text .city {
      font-size: clamp(18px, 5.5vw, 26px);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .poster-text .region {
      margin-top: 4px;
      font-size: clamp(10px, 2.8vw, 13px);
      font-weight: 500;
      letter-spacing: 0.12em;
      opacity: 0.85;
    }

    .swatches {
      display: flex;
      gap: 6px;
      padding: 0 16px 16px;
      flex-wrap: wrap;
    }

    .swatch {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 52px;
    }

    .swatch-color {
      height: 22px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .swatch-label {
      font-size: 10px;
      color: var(--page-muted);
    }

    .swatch-hex {
      font-size: 9px;
      color: #6b7280;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    footer {
      max-width: 1200px;
      margin: 0 auto;
      padding-top: 1.25rem;
      border-top: 1px solid var(--line);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
      justify-content: space-between;
      color: var(--page-muted);
      font-size: 0.85rem;
    }

    footer a {
      color: var(--page-muted);
      text-decoration: none;
    }

    footer a:hover { color: var(--page-text); }
  </style>
</head>

        map: {
          land: "#F2F0EC", water: "#C8D0D8", parks: "#D8DCE0", buildings: "#A8B0B8",
          roads: { major: "#E8600A", minor_mid: "#B8B4AC", minor_low: "#C8C4BC", path: "#D0CEC8" }
        }
      },
      {
        id: "fallout",
        nameZh: "辐射", nameEn: "Fallout",
        descZh: "废土终端夜色——橄榄黑机壳与 Pip-Boy 磷光绿。",
        descEn: "Wasteland terminal night — olive-black chassis with Pip-Boy phosphor green.",
        tier: "pro",
        ui: { bg: "#0C1408", text: "#33FF00" },
        map: {
          land: "#0C1408", water: "#081008", parks: "#142018", buildings: "#3A5840",
          roads: { major: "#33FF00", minor_mid: "#243820", minor_low: "#182818", path: "#1A2818" }
        }
      }
    ];

    const legacyThemes = [
      {
        id: "paper_white",
        nameZh: "报纸", nameEn: "Newspaper",
        descZh: "泛黄新闻纸底色，油墨感炭黑道路，复古报纸版式。",
        descEn: "Yellowed newsprint base with inky charcoal roads — classic broadsheet feel.",
        tier: "legacy",
        ui: { bg: "#F4F0E8", text: "#2C2824" },
        map: {
          land: "#F4F0E8", water: "#D8D2C8", parks: "#E8E4DC", buildings: "#B8A898",
          roads: { major: "#3A3430", minor_mid: "#A89888", minor_low: "#B8A898", path: "#D0C8BC" }
        }
      },
      {
        id: "ember_glow",
        nameZh: "余烬", nameEn: "Ember",
        descZh: "炭黑底色，燃烧的余烬橙道路。",
        descEn: "Charred dark base with glowing ember-orange arteries.",
        tier: "legacy",
        ui: { bg: "#1A1008", text: "#FFB060" },
        map: {
          land: "#1A1008", water: "#241408", parks: "#2E1A0C", buildings: "#A86838",
          roads: { major: "#FF7830", minor_mid: "#403028", minor_low: "#302418", path: "#4A3828" }
        }
      }
    ];

    function roadSVG(colors) {
      const { major, minor_mid, minor_low, path } = colors;
      return `
        <svg class="roads" viewBox="0 0 393 852" preserveAspectRatio="none" aria-hidden="true">
          <path d="M-20 180 Q 120 200, 200 260 T 420 320" stroke="${path}" stroke-width="5" fill="none" opacity="0.7"/>
          <path d="M80 420 Q 180 400, 280 430 T 420 470" stroke="${minor_low}" stroke-width="7" fill="none"/>
          <path d="M-10 520 Q 140 500, 260 540 T 420 600" stroke="${minor_mid}" stroke-width="9" fill="none"/>
          <path d="M40 650 L 360 720" stroke="${minor_mid}" stroke-width="8" fill="none"/>
          <path d="M-30 740 Q 200 700, 420 760" stroke="${major}" stroke-width="12" fill="none"/>
          <path d="M180 -20 L 210 900" stroke="${major}" stroke-width="10" fill="none" opacity="0.85"/>
          <path d="M20 300 L 380 340" stroke="${major}" stroke-width="11" fill="none"/>
        </svg>`;
    }

    function tierBadge(theme) {
      if (theme.tier === "pro") return `<span class="badge pro">PRO</span>`;
      if (theme.tier === "legacy") return `<span class="badge legacy">旧版</span>`;
      return `<span class="badge">基础</span>`;
    }

    function renderTheme(theme, index) {
      const { ui, map } = theme;
      const fade = `linear-gradient(to top, ${ui.bg} 0%, transparent 100%)`;
      const sourceBadge = theme.badge
        ? `<span class="badge source">${theme.badge}</span>`
        : "";

      const swatchItems = [
        ["背景 / BG", ui.bg],
        ["文字 / Text", ui.text],
        ["主路 / Major", map.roads.major],
        ["水体 / Water", map.water],
        ["公园 / Parks", map.parks]
      ].map(([label, color]) => `
        <div class="swatch">
          <div class="swatch-color" style="background:${color}"></div>
          <div class="swatch-label">${label}</div>
          <div class="swatch-hex">${color}</div>
        </div>`).join("");

      return `
        <article class="theme-card" style="animation-delay:${Math.min(index * 0.04, 0.4)}s">
          <div class="theme-meta">
            <h3>
              <span class="theme-title-wrap">
                <span class="theme-title-zh">${theme.nameZh}</span>
                <span class="theme-title-en">${theme.nameEn}</span>
              </span>
              <span class="badges">${tierBadge(theme)}${sourceBadge}</span>
            </h3>
            <p>${theme.descZh}</p>
            <p class="theme-desc-en">${theme.descEn}</p>
          </div>
          <div class="phone-wrap">
            <div class="phone">
              <div class="wallpaper">
                <div class="layer-land" style="background:${map.land}"></div>
                <div class="layer-water" style="background:${map.water}"></div>
                <div class="layer-park" style="background:${map.parks}"></div>
                <div class="layer-building" style="background:${map.buildings}"></div>
                ${roadSVG(map.roads)}
                <div class="fade-bottom" style="background:${fade}"></div>
                <div class="poster-text">
                  <div class="city" style="color:${ui.text}">XI'AN</div>
                  <div class="region" style="color:${ui.text}">CHINA</div>
                </div>
              </div>
            </div>
          </div>
          <div class="swatches">${swatchItems}</div>
        </article>`;
    }

    function mount(list, gridId, countId) {
      document.getElementById(gridId).innerHTML = list.map(renderTheme).join("");
      document.getElementById(countId).textContent = String(list.length);
    }

    mount(basicThemes, "basic-grid", "basic-count");
    mount(proThemes, "pro-grid", "pro-count");
    mount(legacyThemes, "legacy-grid", "legacy-count");
  </script>
</body>
</html>
