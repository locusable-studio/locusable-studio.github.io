<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Here Wallpaper — Themes</title>
  <meta name="description" content="Here Wallpaper theme preview — Basic, Pro, and Legacy palettes.">
  <link rel="icon" href="/favicon.ico?v=7" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=7">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=7">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=7">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #071018;
      --page-text: #f2efe8;
      --page-muted: #9aa6b2;
      --card-bg: #101820;
      --border: #243040;
      --gold: #c9a24d;
      --line: rgba(242, 239, 232, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Instrument Sans", system-ui, sans-serif;
      background:
        radial-gradient(ellipse 70% 40% at 80% 0%, rgba(201, 162, 77, 0.12), transparent 50%),
        var(--page-bg);
      color: var(--page-text);
      line-height: 1.5;
      padding: 28px 24px 48px;
    }

    .topbar {
      max-width: 1200px;
      margin: 0 auto 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      align-items: baseline;
      justify-content: flex-start;
    }

    .topbar a {
      color: var(--page-muted);
      text-decoration: none;
      font-size: 14px;
    }

    .topbar a:hover { color: var(--page-text); }

    header {
      max-width: 1200px;
      margin: 0 auto 40px;
      animation: rise 0.7s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: none; }
    }

    .page-title {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 400;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .page-lead {
      margin-top: 14px;
      max-width: 36rem;
      color: var(--page-muted);
      font-size: 15px;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--page-muted);
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: baseline;
    }

    .section-title {
      font-size: 15px;
      color: var(--page-text);
      text-transform: none;
      letter-spacing: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .theme-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: rise 0.6s ease both;
    }

    .theme-meta { padding: 16px 16px 12px; }

    .theme-meta h3 {
      font-size: 17px;
      font-weight: 600;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .theme-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 999px;
      background: #2a3140;
      color: #aeb6c2;
    }

    .badge.pro { background: #2b2240; color: #c4a8e8; }
    .badge.legacy { background: #2a2818; color: #c4b88a; }
    .badge.source { background: #1e2a38; color: #8eb4d0; }

    .theme-meta p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--page-muted);
      line-height: 1.45;
    }

    section {
      max-width: 1200px;
      margin: 0 auto 48px;
    }

    .phone-wrap { padding: 0 16px 16px; }

    .phone {
      width: 100%;
      aspect-ratio: 393 / 284;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .wallpaper {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .layer-land { position: absolute; inset: 0; }

    .layer-water {
      position: absolute;
      right: 6%;
      top: 8%;
      width: 38%;
      height: 42%;
      border-radius: 18% 42% 38% 28%;
      opacity: 0.95;
    }

    .layer-park {
      position: absolute;
      left: 5%;
      top: 38%;
      width: 30%;
      height: 32%;
      border-radius: 12px;
      opacity: 0.9;
    }

    .layer-building {
      position: absolute;
      left: 40%;
      top: 22%;
      width: 20%;
      height: 40%;
      border-radius: 4px;
      opacity: 0.85;
    }

    .roads {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .fade-bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 48%;
      pointer-events: none;
    }

    .poster-text {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 12%;
      text-align: center;
      z-index: 2;
      pointer-events: none;
    }

    .poster-text .city {
      font-size: clamp(16px, 5vw, 24px);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .poster-text .region {
      margin-top: 3px;
      font-size: clamp(9px, 2.5vw, 12px);
      font-weight: 500;
      letter-spacing: 0.12em;
      opacity: 0.85;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      padding: 0 16px 16px;
    }

    .swatch {
      height: 22px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    footer {
      max-width: 1200px;
      margin: 0 auto;
      padding-top: 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
      justify-content: space-between;
      color: var(--page-muted);
      font-size: 0.85rem;
    }

    footer a {
      color: var(--page-muted);
      text-decoration: none;
    }

    footer a:hover { color: var(--page-text); }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/here-wallpaper/">← Here Wallpaper</a>
  </div>

  <header>
    <h1 class="page-title">Themes</h1>
    <p class="page-lead">Same palettes as in the app. Basic is free, Pro unlocks with subscription, and Legacy themes remain available.</p>
  </header>

  <section id="basic-section">
    <h2>
      <span class="section-title">Basic</span>
    </h2>
    <div class="grid" id="basic-grid"></div>
  </section>

  <section id="pro-section">
    <h2>

    <div class="grid" id="pro-grid"></div>

  <section id="legacy-section">
    <h2>
      <span class="section-title">Legacy</span>
    </h2>
    <div class="grid" id="legacy-grid"></div>
  </section>

  <footer>
    <span>© 2026 Locusable Studio</span>
    <a href="/here-wallpaper/privacy/">Privacy Policy</a>
  </footer>

        map: {
          land: "#1A1008", water: "#241408", parks: "#2E1A0C", buildings: "#A86838",
          roads: { major: "#FF7830", minor_mid: "#403028", minor_low: "#302418", path: "#4A3828" }
        }
      }
    ];

    function roadSVG(colors) {
      const { major, minor_mid, minor_low, path } = colors;
      return `
        <svg class="roads" viewBox="0 0 393 284" preserveAspectRatio="none" aria-hidden="true">
          <path d="M-20 36 Q 120 48, 200 78 T 420 108" stroke="${path}" stroke-width="5" fill="none" opacity="0.7"/>
          <path d="M80 96 Q 180 82, 280 108 T 420 132" stroke="${minor_low}" stroke-width="7" fill="none"/>
          <path d="M-10 148 Q 140 132, 260 162 T 420 198" stroke="${minor_mid}" stroke-width="9" fill="none"/>
          <path d="M40 188 L 360 228" stroke="${minor_mid}" stroke-width="8" fill="none"/>
          <path d="M-30 236 Q 200 210, 420 250" stroke="${major}" stroke-width="12" fill="none"/>
          <path d="M180 -20 L 210 310" stroke="${major}" stroke-width="10" fill="none" opacity="0.85"/>
          <path d="M20 64 L 380 92" stroke="${major}" stroke-width="11" fill="none"/>
        </svg>`;
    }

    function tierBadge(theme) {
      if (theme.tier === "pro") return `<span class="badge pro">PRO</span>`;
      if (theme.tier === "legacy") return `<span class="badge legacy">Legacy</span>`;
      return `<span class="badge">Basic</span>`;
    }

    function renderTheme(theme, index) {
      const { ui, map } = theme;
      const fade = `linear-gradient(to top, ${ui.bg} 0%, transparent 100%)`;
      const sourceBadge = theme.badge
        ? `<span class="badge source">${theme.badge}</span>`
        : "";

      const swatchItems = [ui.bg, ui.text, map.roads.major, map.water, map.parks]
        .map((color) => `<div class="swatch" style="background:${color}"></div>`)
        .join("");

      return `
        <article class="theme-card" id="${theme.id}" style="animation-delay:${Math.min(index * 0.04, 0.4)}s">
          <div class="theme-meta">
            <h3>
              <span class="theme-title-wrap">${theme.name}</span>
              <span class="badges">${tierBadge(theme)}${sourceBadge}</span>
            </h3>
            <p>${theme.description}</p>
          </div>
          <div class="phone-wrap">
            <div class="phone">
              <div class="wallpaper">
                <div class="layer-land" style="background:${map.land}"></div>
                <div class="layer-water" style="background:${map.water}"></div>
                <div class="layer-park" style="background:${map.parks}"></div>
                <div class="layer-building" style="background:${map.buildings}"></div>
                ${roadSVG(map.roads)}
                <div class="fade-bottom" style="background:${fade}"></div>
                <div class="poster-text">
                  <div class="city" style="color:${ui.text}">XI'AN</div>
                  <div class="region" style="color:${ui.text}">CHINA</div>
                </div>
              </div>
            </div>
          </div>
          <div class="swatches">${swatchItems}</div>
        </article>`;
    }

    function mount(list, gridId) {
      document.getElementById(gridId).innerHTML = list.map(renderTheme).join("");
    }

    mount(basicThemes, "basic-grid");
    mount(proThemes, "pro-grid");
    mount(legacyThemes, "legacy-grid");
  </script>
</body>
</html>
