    :root {
      --page-bg: #1c1917;
      --page-text: #f5f5f4;
      --page-muted: #a8a29e;
      --card-bg: #292524;
      --border: #44403c;
      --gold: #c9a24d;
      --line: rgba(245, 245, 244, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: var(--page-bg); }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      background: var(--page-bg);
      color: var(--page-text);
      line-height: 1.5;
      padding: calc(28px + env(safe-area-inset-top)) 24px calc(48px + env(safe-area-inset-bottom));
    }

    .topbar {
      max-width: 1200px;
      margin: 0 auto 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      align-items: baseline;
      justify-content: flex-start;
    }

    .topbar a {
      color: var(--page-muted);
      text-decoration: none;
      font-size: 14px;
    }

    .topbar a:hover { color: var(--page-text); }

    header {
      max-width: 1200px;
      margin: 0 auto 40px;
      animation: rise 0.7s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: none; }
    }

    .page-title {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 400;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .page-lead {
      margin-top: 14px;
      max-width: 36rem;
      color: var(--page-muted);
      font-size: 15px;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--page-muted);
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: baseline;
    }

    .section-title {
      font-size: 15px;
      color: var(--page-text);
      text-transform: none;
      letter-spacing: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .theme-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: rise 0.6s ease both;
    }

    .theme-meta { padding: 16px 16px 12px; }

    .theme-meta h3 {
      font-size: 17px;
      font-weight: 600;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .theme-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 999px;
      background: #2a3140;
      color: #aeb6c2;
    }

    .badge.source { background: #1e2a38; color: #8eb4d0; }

    .theme-meta p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--page-muted);
      line-height: 1.45;
    }

    section {
      max-width: 1200px;
      margin: 0 auto 48px;
    }

    .phone-wrap { padding: 0 16px 16px; }

    .phone {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .wallpaper {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .layer-land { position: absolute; inset: 0; }

    .layer-park {
      position: absolute;
      left: 6%;
      top: 38%;
      width: 28%;
      height: 14%;
      border-radius: 3%;
    }

    .layer-water {
      position: absolute;
      left: 58%;
      top: 22%;
      width: 34%;
      height: 22%;
      border-radius: 50%;
    }

    .roads {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .fade-bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 25%;
      pointer-events: none;
    }

    .poster-text {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 7%;
      text-align: center;
      z-index: 2;
      pointer-events: none;
    }

    .poster-text .city {
      font-size: clamp(16px, 5vw, 24px);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .poster-text .region {
      margin-top: 3px;
      font-size: clamp(9px, 2.5vw, 12px);
      font-weight: 500;
      letter-spacing: 0.12em;
      opacity: 0.85;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      padding: 0 16px 16px;
    }

    .swatch {
      height: 22px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    footer {
      max-width: 1200px;
      margin: 0 auto;
      padding-top: 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
      justify-content: space-between;
      color: var(--page-muted);
      font-size: 0.85rem;
    }

    footer a {
      color: var(--page-muted);
      text-decoration: none;
    }

    footer a:hover { color: var(--page-text); }
  </style>
</head>

        map: {
          land: "#1A1008", water: "#120B04", park: "#2E1A0C",

            residential: "#302418", path: "#4A3828", outline: "#584838"
          }
        }
      }

    const RoadStyle = {
      pathOpacity: 0.82,
      residentialOpacity: 0.46,
      tertiaryOpacity: 0.74,
      primaryOpacity: 0.92,
      motorwayOpacity: 1,
      outlineOpacity: 0.85,
      majorCasing: 1.38,
      primaryCasing: 1.45,
      tertiaryCasing: 1.15,
      pathCasing: 1.6
    };

    function curvedD(from, control, to, end) {
      const c2x = to[0] + (end[0] - to[0]) * 0.6;
      const c2y = to[1] + (end[1] - to[1]) * 0.4;
      return `M${from[0]} ${from[1]} Q ${control[0]} ${control[1]}, ${to[0]} ${to[1]} Q ${c2x} ${c2y}, ${end[0]} ${end[1]}`;
    }

    function roadPair(d, fill, width, fillOpacity, casingScale, outline) {
      const casing = width * casingScale;
      return `
        <path d="${d}" stroke="${outline}" stroke-width="${casing}" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="${RoadStyle.outlineOpacity}"/>
        <path d="${d}" stroke="${fill}" stroke-width="${width}" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="${fillOpacity}"/>`;
    }

    function roadSVG(colors) {
      const { motorway, primary, tertiary, residential, path, outline } = colors;
      const pathD = curvedD([-20, 60], [120, 80], [200, 120], [420, 150]);
      const residentialD = curvedD([80, 180], [180, 160], [280, 190], [420, 220]);
      const tertiaryAD = curvedD([-10, 240], [140, 220], [260, 250], [420, 280]);
      const tertiaryBD = `M40 300 L 360 330`;
      const primaryD = `M20 140 L 380 170`;
      const motorwayAD = curvedD([-30, 340], [200, 310], [200, 310], [420, 360]);
      const motorwayBD = `M180 -20 L 210 420`;

      return `
        <svg class="roads" viewBox="0 0 393 393" preserveAspectRatio="none" aria-hidden="true">
          ${roadPair(pathD, path, 5, RoadStyle.pathOpacity, RoadStyle.pathCasing, outline)}
          <path d="${residentialD}" stroke="${residential}" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="${RoadStyle.residentialOpacity}"/>
          ${roadPair(tertiaryAD, tertiary, 9, RoadStyle.tertiaryOpacity, RoadStyle.tertiaryCasing, outline)}
          ${roadPair(tertiaryBD, tertiary, 8, RoadStyle.tertiaryOpacity, RoadStyle.tertiaryCasing, outline)}
          ${roadPair(primaryD, primary, 10, RoadStyle.primaryOpacity, RoadStyle.primaryCasing, outline)}
          ${roadPair(motorwayAD, motorway, 12, RoadStyle.motorwayOpacity, RoadStyle.majorCasing, outline)}
          ${roadPair(motorwayBD, motorway, 10, RoadStyle.motorwayOpacity, RoadStyle.majorCasing, outline)}
        </svg>`;
    }

    function renderTheme(theme, index) {
      const { ui, map } = theme;
      const fade = `linear-gradient(to top, ${ui.bg} 0%, transparent 100%)`;
      const badges = theme.badge
        ? `<span class="badges"><span class="badge source">${theme.badge}</span></span>`
        : "";

      const swatchItems = [ui.bg, ui.text, map.roads.motorway, map.water, map.park]
        .map((color) => `<div class="swatch" style="background:${color}"></div>`)
        .join("");

      return `
        <article class="theme-card" id="${theme.id}" style="animation-delay:${Math.min(index * 0.04, 0.4)}s">
          <div class="theme-meta">
            <h3>
              <span class="theme-title-wrap">${theme.name}</span>
              ${badges}
            </h3>
            <p>${theme.description}</p>
          </div>
          <div class="phone-wrap">
            <div class="phone">
              <div class="wallpaper">
                <div class="layer-land" style="background:${map.land}"></div>
                <div class="layer-park" style="background:${map.park}"></div>
                <div class="layer-water" style="background:${map.water}"></div>
                ${roadSVG(map.roads)}
                <div class="fade-bottom" style="background:${fade}"></div>
                <div class="poster-text">
                  <div class="city" style="color:${ui.text}">XI'AN</div>
                  <div class="region" style="color:${ui.text}">CHINA</div>
                </div>
              </div>
            </div>
          </div>
          <div class="swatches">${swatchItems}</div>
        </article>`;
    }

    function mount(list, gridId) {
      document.getElementById(gridId).innerHTML = list.map(renderTheme).join("");
    }

    mount(basicThemes, "basic-grid");
    mount(proThemes, "pro-grid");
    mount(moreThemes, "more-grid");
  </script>
