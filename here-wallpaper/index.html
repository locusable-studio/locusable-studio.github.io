<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Here Wallpaper — Locusable Studio</title>
  <meta name="description" content="Here Wallpaper — map lock-screen wallpapers. Pick a place, theme, and layout.">
  <link rel="icon" href="/favicon.ico?v=7" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=7">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=7">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=7">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #071018;
      --bg-2: #0b1829;
      --fg: #f2efe8;
      --muted: #9aa6b2;
      --gold: #c9a24d;
      --line: rgba(242, 239, 232, 0.12);
      --card: rgba(14, 28, 44, 0.72);
      --theme-card: #101820;
      --border: #243040;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100%; }

    body {
      font-family: "Instrument Sans", system-ui, sans-serif;
      color: var(--fg);
      background:
        radial-gradient(ellipse 80% 50% at 70% -10%, rgba(201, 162, 77, 0.18), transparent 55%),
        radial-gradient(ellipse 60% 40% at 10% 90%, rgba(64, 120, 160, 0.16), transparent 50%),
        linear-gradient(165deg, var(--bg) 0%, var(--bg-2) 55%, #091420 100%);
      background-attachment: fixed;
      line-height: 1.5;
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 920px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 1.5rem;
    }

    .topbar {
      display: flex;
      justify-content: flex-start;
      gap: 1rem;
      animation: rise 0.7s ease both;
    }

    .topbar a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .topbar a:hover,
    .topbar a:focus-visible {
      color: var(--fg);
      outline: none;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem 0 3rem;
      animation: rise 0.8s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: none; }
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      flex-wrap: wrap;
    }

    .app-icon {
      width: clamp(64px, 14vw, 88px);
      height: clamp(64px, 14vw, 88px);
      border-radius: 20px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .brand {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(2.75rem, 8vw, 4.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }

    .brand em {
      font-style: italic;
      color: var(--gold);
    }

    .tagline {
      margin-top: 0.85rem;
      max-width: 30rem;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .themes-panel {
      display: block;
      text-decoration: none;
      color: inherit;
      padding: 1.25rem 1.4rem 1.35rem;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      backdrop-filter: blur(16px);
      animation: rise 0.9s ease 0.12s both;
      transition: border-color 0.25s ease, background 0.25s ease;
    }

    .themes-panel:hover,
    .themes-panel:focus-visible {
      border-color: rgba(201, 162, 77, 0.45);
      background: rgba(18, 36, 56, 0.88);
      outline: none;
    }

    .themes-panel-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 1.15rem;
      align-items: center;
    }

    .themes-panel h2 {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .themes-panel .lead {
      margin-top: 0.35rem;
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 28rem;
    }

    .themes-panel .cta {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gold);
      white-space: nowrap;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-top: 1.15rem;
    }

    .theme-card {
      min-width: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0a1018;
    }

    .phone {
      width: 100%;
      aspect-ratio: 393 / 284;
      overflow: hidden;
      position: relative;
    }

    .wallpaper {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .layer-land,
    .layer-water,
    .layer-park,
    .layer-building,
    .fade-bottom,
    .poster-text {
      position: absolute;
    }

    .layer-land { inset: 0; }

    .layer-water {
      right: 6%;
      top: 8%;
      width: 38%;
      height: 42%;
      border-radius: 18% 42% 38% 28%;
    }

    .layer-park {
      left: 5%;
      top: 38%;
      width: 30%;
      height: 32%;
      border-radius: 8px;
    }

    .layer-building {
      left: 40%;
      top: 22%;
      width: 20%;
      height: 40%;
      border-radius: 3px;
    }

    .roads {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .fade-bottom {
      left: 0;
      right: 0;
      bottom: 0;
      height: 48%;
      pointer-events: none;
    }

    .poster-text {
      left: 0;
      right: 0;
      bottom: 12%;
      text-align: center;
      z-index: 2;
      pointer-events: none;
    }

    .poster-text .city {
      font-size: clamp(9px, 1.8vw, 14px);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .poster-text .region {
      margin-top: 2px;
      font-size: clamp(6px, 1.1vw, 8px);
      font-weight: 500;
      letter-spacing: 0.1em;
      opacity: 0.85;
    }

    footer {
      padding-top: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.85rem;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
    }

    footer a:hover,
    footer a:focus-visible {
      color: var(--fg);
      outline: none;
    }

    @media (max-width: 720px) {
      .theme-grid {
        display: flex;
        overflow-x: auto;
        gap: 10px;
        padding-bottom: 4px;
      }

      .theme-card {
        flex: 0 0 148px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <a href="/">← Locusable Studio</a>
    </div>

    <main class="hero">
      <div>
        <div class="brand-row">
          <img class="app-icon" src="/assets/here/icon-192.png" width="88" height="88" alt="Here Wallpaper">
          <h1 class="brand">Here <em>Wallpaper</em></h1>
        </div>
        <p class="tagline">Map lock-screen wallpapers. Pick a place, theme, and layout.</p>
      </div>

      <a class="themes-panel" href="/here-wallpaper/themes/">
        <div class="themes-panel-top">
          <div>
            <h2>Themes</h2>
            <p class="lead">Preview Basic, Pro, and Legacy palettes with lock-screen mockups.</p>
          </div>
          <span class="cta">Browse →</span>
        </div>
        <div class="theme-grid" id="theme-row"></div>
      </a>
    </main>

    <footer>
      <span>© 2026 Locusable Studio</span>
      <a href="/here-wallpaper/privacy/">Privacy Policy</a>
    </footer>
  </div>

  <script>
    const featured = [
      {
        id: "night_atlas",
        name: "Night Atlas",
        ui: { bg: "#0B1829", text: "#C9A24D" },
        map: {
          land: "#0B1829", water: "#071220", parks: "#102035", buildings: "#5A4D3A",
          roads: { major: "#C9A24D", minor_mid: "#2E3440", path: "#3A3830" }
        }
      },
      {
        id: "blueprint",
        name: "Blueprint",
        ui: { bg: "#1A3A5C", text: "#E8F4FF" },
        map: {
          land: "#1A3A5C", water: "#0E2740", parks: "#1F466F", buildings: "#6EA4CC",
          roads: { major: "#D8EEFA", minor_mid: "#435f7d", path: "#526c88" }
        }
      },
      {
        id: "japanese_ink",
        name: "Japanese Ink",
        ui: { bg: "#FAF8F5", text: "#2C2C2C" },
        map: {
          land: "#FAF8F5", water: "#E8E4E0", parks: "#F0EDE8", buildings: "#959595",
          roads: { major: "#8B2500", minor_mid: "#A8A8A8", path: "#D0CECA" }
        }
      },
      {
        id: "gilded_imperial",
        name: "Gilded Imperial",
        ui: { bg: "#6E1418", text: "#E8C868" },
        map: {
          land: "#6E1418", water: "#4A0C10", parks: "#581418", buildings: "#B8860B",
          roads: { major: "#D4AF37", minor_mid: "#481018", path: "#501418" }
        }
      },
      {
        id: "dracula",
        name: "Dracula",
        ui: { bg: "#282A36", text: "#F8F8F2" },
        map: {
          land: "#282A36", water: "#21222C", parks: "#44475A", buildings: "#6272A4",
          roads: { major: "#FF79C6", minor_mid: "#44475A", path: "#44475A" }
        }
      }
    ];

    function roadSVG(roads) {
      return `
        <svg class="roads" viewBox="0 0 393 284" preserveAspectRatio="none" aria-hidden="true">
          <path d="M-20 36 Q120 48 200 78 T420 108" stroke="${roads.path}" stroke-width="5" fill="none" opacity="0.7"/>
          <path d="M-10 148 Q140 132 260 162 T420 198" stroke="${roads.minor_mid}" stroke-width="9" fill="none"/>
          <path d="M-30 236 Q200 210 420 250" stroke="${roads.major}" stroke-width="12" fill="none"/>
          <path d="M180 -20 L210 310" stroke="${roads.major}" stroke-width="10" fill="none" opacity="0.85"/>
          <path d="M20 64 L380 92" stroke="${roads.major}" stroke-width="11" fill="none"/>
        </svg>`;
    }

    document.getElementById("theme-row").innerHTML = featured.map((theme) => {
      const { ui, map } = theme;
      const fade = `linear-gradient(to top, ${ui.bg} 0%, transparent 100%)`;
      return `
        <article class="theme-card" aria-label="${theme.name}">
          <div class="phone">
            <div class="wallpaper">
              <div class="layer-land" style="background:${map.land}"></div>
              <div class="layer-water" style="background:${map.water}"></div>
              <div class="layer-park" style="background:${map.parks}"></div>
              <div class="layer-building" style="background:${map.buildings}"></div>
              ${roadSVG(map.roads)}
              <div class="fade-bottom" style="background:${fade}"></div>
              <div class="poster-text">
                <div class="city" style="color:${ui.text}">XI'AN</div>
                <div class="region" style="color:${ui.text}">CHINA</div>
              </div>
            </div>
          </div>
        </article>`;
    }).join("");
  </script>
</body>
</html>
